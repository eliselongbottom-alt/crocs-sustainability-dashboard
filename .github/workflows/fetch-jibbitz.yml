name: Fetch Jibbitz Opportunities

on:
  schedule:
    - cron: '0 7 * * *'   # Daily at 7am UTC (3am ET)
  workflow_dispatch:       # Allow manual trigger from GitHub Actions tab

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Run Jibbitz scanner
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 fetch_jibbitz_news.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jibbitz-live-data.js
          git diff --staged --quiet && echo "No changes to commit" || (
            git commit -m "Auto-update Jibbitz opportunities $(date -u +%Y-%m-%d) [skip ci]"
            git push
          )
